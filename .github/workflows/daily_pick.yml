# 美股市場平日收盤約 21:00 UTC（冬令）/ 20:00 UTC（夏令）；此處用 22:05 UTC 預留延遲。
name: StockOracle Daily Pick

on:
  schedule:
    - cron: "5 22 * * 1-5"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: StockOracle/requirements.txt

      - name: Install dependencies
        run: pip install -r StockOracle/requirements.txt

      - name: Run daily pick
        env:
          STOCK_ORACLE_SYMBOLS: ${{ vars.STOCK_ORACLE_SYMBOLS }}
        working-directory: StockOracle
        run: python scheduler.py --period 1y --short-top 10
